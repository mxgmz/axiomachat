<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Axioma — Asistente de RH</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      display: flex;
      flex-direction: column;
      height: 100dvh;
      color: #1a1a2e;
    }

    /* ── Header ── */
    header {
      background: #1a3a5c;
      color: #fff;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
      flex-shrink: 0;
    }
    .logo {
      width: 38px; height: 38px;
      background: #e8a020;
      border-radius: 8px;
      display: grid; place-items: center;
      font-weight: 800; font-size: 18px; color: #fff;
    }
    header h1 { font-size: 17px; font-weight: 600; }
    header p  { font-size: 12px; opacity: .7; margin-top: 1px; }

    /* ── Chat area ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .bubble-wrap { display: flex; flex-direction: column; max-width: 78%; }
    .bubble-wrap.user  { align-self: flex-end; align-items: flex-end; }
    .bubble-wrap.bot   { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 12px 16px;
      border-radius: 18px;
      line-height: 1.55;
      font-size: 14.5px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .bubble-wrap.user .bubble {
      background: #1a3a5c;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .bubble-wrap.bot .bubble {
      background: #fff;
      color: #1a1a2e;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }

    /* ── Sources ── */
    .sources {
      margin-top: 6px;
      font-size: 12px;
    }
    .sources summary {
      cursor: pointer;
      color: #1a3a5c;
      opacity: .7;
      user-select: none;
    }
    .sources summary:hover { opacity: 1; }
    .source-list { margin-top: 8px; display: flex; flex-direction: column; gap: 6px; }
    .source-item {
      background: #f8f9fb;
      border-left: 3px solid #e8a020;
      border-radius: 4px;
      padding: 8px 10px;
      color: #444;
      line-height: 1.4;
    }
    .source-meta {
      font-weight: 600;
      color: #1a3a5c;
      margin-bottom: 3px;
      text-transform: capitalize;
    }
    .source-link { color: #1a3a5c; font-size: 11px; opacity: .7; }
    .source-link:hover { opacity: 1; }

    /* ── Typing indicator ── */
    .typing .bubble {
      display: flex; align-items: center; gap: 5px;
      padding: 14px 18px;
    }
    .dot {
      width: 7px; height: 7px;
      background: #aaa;
      border-radius: 50%;
      animation: bounce .9s infinite;
    }
    .dot:nth-child(2) { animation-delay: .15s; }
    .dot:nth-child(3) { animation-delay: .30s; }
    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); }
      40%          { transform: translateY(-6px); }
    }

    /* ── Intro message ── */
    .intro {
      align-self: center;
      text-align: center;
      background: #fff;
      border-radius: 16px;
      padding: 28px 32px;
      max-width: 480px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    .intro .icon { font-size: 36px; margin-bottom: 10px; }
    .intro h2 { font-size: 18px; color: #1a3a5c; margin-bottom: 6px; }
    .intro p  { font-size: 13px; color: #666; line-height: 1.5; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 16px; }
    .chip {
      background: #eef2f8;
      color: #1a3a5c;
      border: none;
      border-radius: 20px;
      padding: 7px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: background .15s;
    }
    .chip:hover { background: #d8e4f0; }

    /* ── Input bar ── */
    #input-bar {
      display: flex;
      gap: 10px;
      padding: 14px 16px;
      background: #fff;
      border-top: 1px solid #e4e6ea;
      flex-shrink: 0;
    }
    #query {
      flex: 1;
      border: 1.5px solid #d0d5dd;
      border-radius: 24px;
      padding: 10px 18px;
      font-size: 14.5px;
      outline: none;
      transition: border-color .15s;
      resize: none;
      font-family: inherit;
      line-height: 1.4;
      max-height: 120px;
    }
    #query:focus { border-color: #1a3a5c; }

    #send-btn {
      width: 44px; height: 44px;
      background: #1a3a5c;
      color: #fff;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: grid; place-items: center;
      flex-shrink: 0;
      transition: background .15s, transform .1s;
    }
    #send-btn:hover  { background: #234e7a; }
    #send-btn:active { transform: scale(.93); }
    #send-btn:disabled { background: #b0b8c4; cursor: default; }

    @media (max-width: 480px) {
      .bubble-wrap { max-width: 92%; }
      .intro { padding: 22px 18px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">A</div>
  <div>
    <h1>Asistente de Recursos Humanos</h1>
    <p>Axioma — Preguntas sobre prestaciones, políticas y más</p>
  </div>
</header>

<div id="chat">
  <div class="intro" id="intro">
    <div class="icon">👋</div>
    <h2>¡Hola! Soy tu asistente de RH</h2>
    <p>Puedo responder tus preguntas sobre prestaciones, seguros, políticas internas y capacitación en Axioma.</p>
    <div class="chips">
      <button class="chip" onclick="ask(this)">¿Cuáles son mis prestaciones?</button>
      <button class="chip" onclick="ask(this)">¿Cómo funciona el seguro médico?</button>
      <button class="chip" onclick="ask(this)">¿Hay cursos de capacitación?</button>
      <button class="chip" onclick="ask(this)">¿Qué está pasando esta semana en la empresa?</button>
    </div>
  </div>
</div>

<div id="input-bar">
  <textarea id="query" rows="1" placeholder="Escribe tu pregunta..."></textarea>
  <button id="send-btn" onclick="send()" aria-label="Enviar">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"></line>
      <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
    </svg>
  </button>
</div>

<script>
  const chat = document.getElementById('chat');
  const input = document.getElementById('query');
  const btn   = document.getElementById('send-btn');

  // Auto-resize textarea
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });

  function ask(chip) {
    input.value = chip.textContent;
    send();
  }

  function removeIntro() {
    const intro = document.getElementById('intro');
    if (intro) intro.remove();
  }

  function addBubble(role, text, sources) {
    removeIntro();
    const wrap = document.createElement('div');
    wrap.className = `bubble-wrap ${role}`;

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    wrap.appendChild(bubble);

    if (sources && sources.length) {
      const details = document.createElement('details');
      details.className = 'sources';
      const sum = document.createElement('summary');
      sum.textContent = `${sources.length} fuente${sources.length > 1 ? 's' : ''} consultada${sources.length > 1 ? 's' : ''}`;
      details.appendChild(sum);

      const list = document.createElement('div');
      list.className = 'source-list';
      sources.forEach(s => {
        const item = document.createElement('div');
        item.className = 'source-item';
        item.innerHTML = `
          <div class="source-meta">${s.category} · ${s.group} · ${s.date}</div>
          <div>${s.excerpt}</div>
          ${s.url ? `<a class="source-link" href="${s.url}" target="_blank" rel="noopener">Ver publicación →</a>` : ''}
        `;
        list.appendChild(item);
      });
      details.appendChild(list);
      wrap.appendChild(details);
    }

    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
    return wrap;
  }

  function addTyping() {
    removeIntro();
    const wrap = document.createElement('div');
    wrap.className = 'bubble-wrap bot typing';
    wrap.innerHTML = '<div class="bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
    return wrap;
  }

  const history = [];   // [{role, content}] — last 6 turns max

  async function send() {
    const query = input.value.trim();
    if (!query || btn.disabled) return;

    addBubble('user', query);
    input.value = '';
    input.style.height = 'auto';
    btn.disabled = true;

    const typing = addTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query, history }),
      });
      const data = await res.json();
      typing.remove();
      const answer = data.answer || data.error;
      addBubble('bot', answer, data.sources);

      // Keep last 6 turns (3 user + 3 assistant)
      history.push({ role: 'user', content: query });
      history.push({ role: 'assistant', content: answer });
      if (history.length > 12) history.splice(0, 2);
    } catch (err) {
      typing.remove();
      addBubble('bot', 'Error al conectar con el servidor. Intenta de nuevo.');
    } finally {
      btn.disabled = false;
      input.focus();
    }
  }
</script>
</body>
</html>
