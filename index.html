<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>axioma. — Asistente RH</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --yellow:  #FADE00;
      --black:   #000000;
      --white:   #FFFFFF;
      --gray-50: #F8F8F6;
      --gray-200:#E5E5E5;
      --gray-500:#6B6B6B;
    }

    body {
      font-family: "Inter", "Helvetica Neue", Helvetica, Arial, sans-serif;
      background: var(--gray-50);
      display: flex;
      flex-direction: column;
      height: 100dvh;
      color: var(--black);
    }

    /* ── Header ── */
    header {
      background: var(--yellow);
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      height: 60px;
      flex-shrink: 0;
      border-bottom: 2px solid var(--black);
    }

    .wordmark {
      font-family: "Bebas Neue", "Arial Black", sans-serif;
      font-size: 28px;
      letter-spacing: 1px;
      color: var(--black);
      line-height: 1;
      text-decoration: none;
    }

    .header-divider {
      width: 1px;
      height: 24px;
      background: rgba(0,0,0,.25);
    }

    .header-subtitle {
      font-size: 12px;
      font-weight: 600;
      color: var(--black);
      opacity: .6;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .header-nav {
      margin-left: auto;
      display: flex;
      gap: 8px;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--black);
      color: var(--yellow);
      border: none;
      border-radius: 4px;
      padding: 7px 14px;
      font-size: 12px;
      font-weight: 700;
      font-family: inherit;
      text-decoration: none;
      cursor: pointer;
      letter-spacing: .3px;
      transition: opacity .15s;
      white-space: nowrap;
    }
    .nav-btn:hover { opacity: .85; }

    /* ── Chat area ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 28px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    /* ── Bubbles ── */
    .bubble-wrap { display: flex; flex-direction: column; max-width: 76%; }
    .bubble-wrap.user  { align-self: flex-end; align-items: flex-end; }
    .bubble-wrap.bot   { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 12px 16px;
      border-radius: 2px;
      line-height: 1.6;
      font-size: 14.5px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .bubble-wrap.user .bubble {
      background: var(--black);
      color: var(--white);
      border-bottom-right-radius: 0;
    }
    .bubble-wrap.bot .bubble {
      background: var(--white);
      color: var(--black);
      border: 1.5px solid var(--gray-200);
      border-bottom-left-radius: 0;
    }

    /* ── Sources ── */
    .sources { margin-top: 6px; font-size: 12px; }
    .sources summary {
      cursor: pointer;
      color: var(--gray-500);
      user-select: none;
      font-weight: 500;
    }
    .sources summary:hover { color: var(--black); }
    .source-list { margin-top: 8px; display: flex; flex-direction: column; gap: 6px; }
    .source-item {
      background: var(--white);
      border-left: 3px solid var(--yellow);
      border-radius: 2px;
      padding: 8px 10px;
      color: var(--gray-500);
      line-height: 1.4;
    }
    .source-meta { font-weight: 600; color: var(--black); margin-bottom: 3px; text-transform: capitalize; }
    .source-link { color: var(--black); font-size: 11px; opacity: .5; }
    .source-link:hover { opacity: 1; }

    /* ── Typing indicator ── */
    .typing .bubble {
      display: flex; align-items: center; gap: 5px;
      padding: 14px 18px;
    }
    .dot {
      width: 6px; height: 6px;
      background: var(--gray-500);
      border-radius: 50%;
      animation: bounce .9s infinite;
    }
    .dot:nth-child(2) { animation-delay: .15s; }
    .dot:nth-child(3) { animation-delay: .30s; }
    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); }
      40%          { transform: translateY(-5px); }
    }

    /* ── Intro ── */
    .intro {
      align-self: center;
      text-align: center;
      background: var(--white);
      border: 1.5px solid var(--gray-200);
      border-radius: 2px;
      padding: 32px 36px;
      max-width: 500px;
    }

    .intro-logo {
      font-family: "Bebas Neue", "Arial Black", sans-serif;
      font-size: 42px;
      color: var(--black);
      line-height: 1;
      margin-bottom: 4px;
    }

    .intro-tag {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--gray-500);
      margin-bottom: 20px;
    }

    .intro h2 {
      font-size: 17px;
      font-weight: 700;
      color: var(--black);
      margin-bottom: 8px;
    }

    .intro p { font-size: 13px; color: var(--gray-500); line-height: 1.6; }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 20px;
    }
    .chip {
      background: var(--white);
      color: var(--black);
      border: 1.5px solid var(--black);
      border-radius: 2px;
      padding: 7px 14px;
      font-size: 12.5px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all .12s;
    }
    .chip:hover {
      background: var(--yellow);
      border-color: var(--yellow);
    }

    .intro-img-btn {
      margin-top: 16px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--yellow);
      color: var(--black);
      border: 1.5px solid var(--black);
      border-radius: 2px;
      padding: 9px 18px;
      font-size: 12.5px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      transition: opacity .15s;
    }
    .intro-img-btn:hover { opacity: .8; }

    /* ── Input bar ── */
    #input-bar {
      display: flex;
      gap: 10px;
      padding: 14px 16px;
      background: var(--white);
      border-top: 2px solid var(--black);
      flex-shrink: 0;
    }

    #query {
      flex: 1;
      border: 1.5px solid var(--gray-200);
      border-radius: 2px;
      padding: 10px 16px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      resize: none;
      line-height: 1.5;
      max-height: 120px;
      background: var(--gray-50);
      transition: border-color .15s;
    }
    #query:focus { border-color: var(--black); background: var(--white); }

    #send-btn {
      width: 44px; height: 44px;
      background: var(--black);
      color: var(--yellow);
      border: none;
      border-radius: 2px;
      cursor: pointer;
      display: grid; place-items: center;
      flex-shrink: 0;
      transition: opacity .15s, transform .1s;
    }
    #send-btn:hover  { opacity: .85; }
    #send-btn:active { transform: scale(.93); }
    #send-btn:disabled { background: var(--gray-200); color: var(--gray-500); cursor: default; }

    @media (max-width: 480px) {
      .bubble-wrap { max-width: 92%; }
      .intro { padding: 24px 18px; }
      .header-subtitle { display: none; }
    }
  </style>
</head>
<body>

<header>
  <span class="wordmark">axioma.</span>
  <div class="header-divider"></div>
  <span class="header-subtitle">Asistente de Recursos Humanos</span>
  <nav class="header-nav">
    <a href="/imagenes" class="nav-btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      Generar imagen
    </a>
  </nav>
</header>

<div id="chat">
  <div class="intro" id="intro">
    <div class="intro-logo">axioma.</div>
    <div class="intro-tag">inteligencia inmobiliaria</div>
    <h2>Asistente de Recursos Humanos</h2>
    <p>Pregunta sobre prestaciones, seguros, políticas internas, capacitación o busca a cualquier colaborador en el directorio.</p>
    <div class="chips">
      <button class="chip" onclick="ask(this)">¿Cuáles son mis prestaciones?</button>
      <button class="chip" onclick="ask(this)">¿Cómo funciona el seguro médico?</button>
      <button class="chip" onclick="ask(this)">¿Hay cursos de capacitación?</button>
      <button class="chip" onclick="ask(this)">¿Qué está pasando esta semana en la empresa?</button>
    </div>
    <a href="/imagenes" class="intro-img-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      Generador de imágenes →
    </a>
  </div>
</div>

<div id="input-bar">
  <textarea id="query" rows="1" placeholder="Escribe tu pregunta..."></textarea>
  <button id="send-btn" onclick="send()" aria-label="Enviar">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"></line>
      <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
    </svg>
  </button>
</div>

<script>
  const chat  = document.getElementById('chat');
  const input = document.getElementById('query');
  const btn   = document.getElementById('send-btn');

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });

  function ask(chip) { input.value = chip.textContent; send(); }

  function removeIntro() {
    const el = document.getElementById('intro');
    if (el) el.remove();
  }

  function addBubble(role, text, sources) {
    removeIntro();
    const wrap = document.createElement('div');
    wrap.className = `bubble-wrap ${role}`;

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    wrap.appendChild(bubble);

    if (sources && sources.length) {
      const details = document.createElement('details');
      details.className = 'sources';
      const sum = document.createElement('summary');
      sum.textContent = `${sources.length} fuente${sources.length > 1 ? 's' : ''} consultada${sources.length > 1 ? 's' : ''}`;
      details.appendChild(sum);
      const list = document.createElement('div');
      list.className = 'source-list';
      sources.forEach(s => {
        const item = document.createElement('div');
        item.className = 'source-item';
        item.innerHTML = `
          <div class="source-meta">${s.category} · ${s.group} · ${s.date}</div>
          <div>${s.excerpt}</div>
          ${s.url ? `<a class="source-link" href="${s.url}" target="_blank" rel="noopener">Ver publicación →</a>` : ''}
        `;
        list.appendChild(item);
      });
      details.appendChild(list);
      wrap.appendChild(details);
    }

    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
    return wrap;
  }

  function addTyping() {
    removeIntro();
    const wrap = document.createElement('div');
    wrap.className = 'bubble-wrap bot typing';
    wrap.innerHTML = '<div class="bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
    return wrap;
  }

  const history = [];

  async function send() {
    const query = input.value.trim();
    if (!query || btn.disabled) return;
    addBubble('user', query);
    input.value = '';
    input.style.height = 'auto';
    btn.disabled = true;
    const typing = addTyping();
    try {
      const res  = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query, history }),
      });
      const data = await res.json();
      typing.remove();
      const answer = data.answer || data.error;
      addBubble('bot', answer, data.sources);
      history.push({ role: 'user', content: query });
      history.push({ role: 'assistant', content: answer });
      if (history.length > 12) history.splice(0, 2);
    } catch {
      typing.remove();
      addBubble('bot', 'Error al conectar con el servidor. Intenta de nuevo.');
    } finally {
      btn.disabled = false;
      input.focus();
    }
  }
</script>
</body>
</html>
