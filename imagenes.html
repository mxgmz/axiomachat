<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>axioma. — Generador de Imágenes</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --yellow:  #FADE00;
      --black:   #000000;
      --white:   #FFFFFF;
      --gray-50: #F8F8F6;
      --gray-200:#E5E5E5;
      --gray-500:#6B6B6B;
    }

    body {
      font-family: "Inter", "Helvetica Neue", Helvetica, Arial, sans-serif;
      background: var(--gray-50);
      display: flex;
      flex-direction: column;
      height: 100dvh;
      color: var(--black);
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: var(--yellow);
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      height: 60px;
      flex-shrink: 0;
      border-bottom: 2px solid var(--black);
    }
    .wordmark {
      font-family: "Bebas Neue", "Arial Black", sans-serif;
      font-size: 28px;
      letter-spacing: 1px;
      color: var(--black);
      line-height: 1;
      text-decoration: none;
    }
    .header-divider { width: 1px; height: 24px; background: rgba(0,0,0,.25); }
    .header-subtitle {
      font-size: 12px; font-weight: 600; color: var(--black);
      opacity: .6; text-transform: uppercase; letter-spacing: .5px;
    }
    .header-nav { margin-left: auto; display: flex; gap: 8px; }
    .nav-btn {
      display: flex; align-items: center; gap: 6px;
      background: var(--black); color: var(--yellow);
      border: none; border-radius: 2px;
      padding: 7px 14px; font-size: 12px; font-weight: 700;
      font-family: inherit; text-decoration: none; cursor: pointer;
      transition: opacity .15s; white-space: nowrap;
    }
    .nav-btn:hover { opacity: .85; }

    /* ── Feed — min-height:0 is critical for flex overflow scroll ── */
    #feed {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 28px 16px 40px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      scroll-behavior: smooth;
    }

    /* ── Intro ── */
    .intro {
      align-self: center; text-align: center;
      background: var(--white); border: 1.5px solid var(--gray-200);
      border-radius: 2px; padding: 36px 40px; max-width: 520px;
    }
    .intro-logo {
      font-family: "Bebas Neue", "Arial Black", sans-serif;
      font-size: 42px; color: var(--black); line-height: 1; margin-bottom: 4px;
    }
    .intro-tag {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 1px; color: var(--gray-500); margin-bottom: 20px;
    }
    .intro h2 { font-size: 17px; font-weight: 700; margin-bottom: 8px; }
    .intro p  { font-size: 13px; color: var(--gray-500); line-height: 1.6; }

    /* ── Image card ── */
    .img-card {
      align-self: center;
      background: var(--white);
      border: 1.5px solid var(--gray-200);
      border-radius: 2px;
      overflow: hidden;
      max-width: 540px;
      width: 100%;
      animation: cardIn .35s cubic-bezier(.22,.68,0,1.2) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Image with hover overlay */
    .img-wrapper {
      position: relative;
      line-height: 0;
      overflow: hidden;
      aspect-ratio: 1;
    }
    .img-wrapper img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      transition: transform .4s cubic-bezier(.22,.68,0,1.2);
    }
    .img-wrapper:hover img { transform: scale(1.02); }

    .img-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .25s;
    }
    .img-wrapper:hover .img-overlay { background: rgba(0,0,0,.38); }

    .dl-hover-btn {
      background: var(--yellow);
      color: var(--black);
      border: none;
      border-radius: 2px;
      padding: 11px 22px;
      font-size: 13px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      opacity: 0;
      transform: translateY(10px) scale(.95);
      transition: opacity .22s, transform .22s;
      box-shadow: 0 4px 16px rgba(0,0,0,.25);
    }
    .img-wrapper:hover .dl-hover-btn {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
    .dl-hover-btn:active { transform: scale(.96); }

    /* Meta bar */
    .img-meta {
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-top: 1.5px solid var(--gray-200);
    }
    .type-badge {
      background: var(--yellow); color: var(--black);
      border-radius: 2px; padding: 3px 9px;
      font-size: 11px; font-weight: 700;
      white-space: nowrap; text-transform: uppercase; letter-spacing: .4px;
    }
    .img-prompt-text {
      flex: 1; font-size: 12px; color: var(--gray-500);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* ── Skeleton ── */
    .skeleton-card {
      align-self: center;
      background: var(--white);
      border: 1.5px solid var(--gray-200);
      border-radius: 2px;
      overflow: hidden;
      max-width: 540px;
      width: 100%;
      animation: cardIn .35s cubic-bezier(.22,.68,0,1.2) both;
    }
    .skeleton-img {
      width: 100%;
      aspect-ratio: 1;
      background: linear-gradient(110deg, var(--gray-50) 30%, #eeecea 50%, var(--gray-50) 70%);
      background-size: 200% 100%;
      animation: shimmer 1.6s ease-in-out infinite;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: var(--gray-500);
      font-size: 13px;
      font-weight: 500;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    .spinner {
      width: 30px; height: 30px;
      border: 2.5px solid var(--gray-200);
      border-top-color: var(--black);
      border-radius: 50%;
      animation: spin .75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Input bar ── */
    #input-bar {
      background: var(--white);
      border-top: 2px solid var(--black);
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex-shrink: 0;
    }

    .top-row { display: flex; align-items: center; gap: 12px; }

    .type-pills {
      display: flex; gap: 8px; overflow-x: auto;
      flex: 1; padding-bottom: 2px; scrollbar-width: none;
    }
    .type-pills::-webkit-scrollbar { display: none; }

    .pill {
      background: var(--white); color: var(--black);
      border: 1.5px solid var(--gray-200); border-radius: 2px;
      padding: 6px 13px; font-size: 12.5px; font-weight: 600;
      font-family: inherit; cursor: pointer; white-space: nowrap;
      flex-shrink: 0; transition: all .12s;
    }
    .pill:hover { border-color: var(--black); }
    .pill.active { background: var(--yellow); border-color: var(--black); }

    .model-toggle {
      display: flex; border: 1.5px solid var(--black);
      border-radius: 2px; overflow: hidden; flex-shrink: 0;
    }
    .model-btn {
      background: var(--white); color: var(--black); border: none;
      padding: 6px 11px; font-size: 11px; font-weight: 700;
      font-family: inherit; cursor: pointer; transition: all .12s; white-space: nowrap;
    }
    .model-btn + .model-btn { border-left: 1.5px solid var(--black); }
    .model-btn:hover { background: var(--gray-50); }
    .model-btn.active { background: var(--black); color: var(--yellow); }

    .input-row { display: flex; gap: 8px; align-items: flex-end; }

    #prompt {
      flex: 1; border: 1.5px solid var(--gray-200); border-radius: 2px;
      padding: 10px 16px; font-size: 14px; font-family: inherit;
      outline: none; resize: none; line-height: 1.5; max-height: 100px;
      background: var(--gray-50); transition: border-color .15s, background .15s;
    }
    #prompt:focus { border-color: var(--black); background: var(--white); }

    .icon-btn {
      width: 44px; height: 44px;
      border: 1.5px solid var(--gray-200); background: var(--white);
      border-radius: 2px; cursor: pointer; display: grid; place-items: center;
      flex-shrink: 0; transition: all .12s; color: var(--gray-500);
    }
    .icon-btn:hover { border-color: var(--black); color: var(--black); }
    .icon-btn.has-image { border-color: var(--black); background: var(--yellow); color: var(--black); }

    #gen-btn {
      width: 44px; height: 44px;
      background: var(--black); color: var(--yellow);
      border: none; border-radius: 2px; cursor: pointer;
      display: grid; place-items: center; flex-shrink: 0;
      transition: opacity .15s, transform .1s;
    }
    #gen-btn:hover  { opacity: .85; }
    #gen-btn:active { transform: scale(.93); }
    #gen-btn:disabled { background: var(--gray-200); color: var(--gray-500); cursor: default; }

    #img-preview {
      display: none; align-items: center; gap: 8px;
      background: var(--yellow); border: 1.5px solid var(--black);
      border-radius: 2px; padding: 6px 10px;
      font-size: 12px; font-weight: 600; color: var(--black);
    }
    #img-preview.show { display: flex; }
    #img-preview img { width: 30px; height: 30px; object-fit: cover; border-radius: 2px; }
    #remove-img {
      background: none; border: none; cursor: pointer;
      color: var(--black); font-size: 18px; line-height: 1; margin-left: auto;
    }

    .err-card {
      align-self: center; background: var(--white);
      border: 1.5px solid #d00000; border-radius: 2px;
      padding: 14px 18px; color: #d00000;
      font-size: 13px; font-weight: 500; max-width: 540px; width: 100%;
    }

    @media (max-width: 540px) {
      .img-card, .skeleton-card { max-width: 100%; }
      .intro { padding: 24px 18px; }
      .header-subtitle { display: none; }
    }
  </style>
</head>
<body>

<header>
  <a href="/" class="wordmark">axioma.</a>
  <div class="header-divider"></div>
  <span class="header-subtitle">Generador de Imágenes</span>
  <nav class="header-nav">
    <a href="/" class="nav-btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      Asistente RH
    </a>
  </nav>
</header>

<div id="feed">
  <div class="intro" id="intro">
    <div class="intro-logo">axioma.</div>
    <div class="intro-tag">inteligencia inmobiliaria</div>
    <h2>Generador de Imágenes</h2>
    <p>Crea tarjetas con la identidad visual de Axioma. Menciona el nombre de un colaborador y lo buscaremos en el directorio automáticamente.</p>
  </div>
</div>

<div id="input-bar">
  <div class="top-row">
    <div class="type-pills">
      <button class="pill active" data-type="cumpleanos">🎂 Cumpleaños</button>
      <button class="pill" data-type="aniversario">🎉 Aniversario</button>
      <button class="pill" data-type="bienvenida">👋 Bienvenida</button>
      <button class="pill" data-type="logro">🏆 Logro</button>
      <button class="pill" data-type="personalizado">✦ Personalizado</button>
    </div>
    <div class="model-toggle">
      <button class="model-btn active" data-model="gpt-image-1">Image 1</button>
      <button class="model-btn" data-model="gpt-image-2">Image 2 ✦</button>
      <button class="model-btn" data-model="nano-banana-2">🍌 Nano</button>
    </div>
  </div>

  <div id="img-preview">
    <img id="preview-thumb" src="" alt="" />
    <span id="preview-name">imagen.png</span>
    <button id="remove-img" onclick="removeImage()" title="Quitar">×</button>
  </div>

  <div class="input-row">
    <textarea id="prompt" rows="1" placeholder="Ej: Feliz cumpleaños para María González del área de Finanzas"></textarea>
    <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleFile(event)" />
    <button class="icon-btn" id="upload-btn" onclick="document.getElementById('file-input').click()" title="Agregar imagen de referencia">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
    </button>
    <button id="gen-btn" onclick="generate()" title="Generar imagen">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
    </button>
  </div>
</div>

<script>
  const feed     = document.getElementById('feed');
  const promptEl = document.getElementById('prompt');
  const genBtn   = document.getElementById('gen-btn');
  const uploadBtn = document.getElementById('upload-btn');

  let selectedType  = 'cumpleanos';
  let selectedModel = 'gpt-image-1';
  let uploadedImageB64 = null;

  const TYPE_LABELS = {
    cumpleanos:   '🎂 Cumpleaños',
    aniversario:  '🎉 Aniversario',
    bienvenida:   '👋 Bienvenida',
    logro:        '🏆 Logro',
    personalizado:'✦ Personalizado',
  };

  document.querySelectorAll('.pill').forEach(pill => {
    pill.addEventListener('click', () => {
      document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      selectedType = pill.dataset.type;
    });
  });

  document.querySelectorAll('.model-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedModel = btn.dataset.model;
    });
  });

  promptEl.addEventListener('input', () => {
    promptEl.style.height = 'auto';
    promptEl.style.height = Math.min(promptEl.scrollHeight, 100) + 'px';
  });
  promptEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); generate(); }
  });

  function handleFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const dataUrl = ev.target.result;
      uploadedImageB64 = dataUrl.split(',')[1];
      document.getElementById('preview-thumb').src = dataUrl;
      document.getElementById('preview-name').textContent = file.name;
      document.getElementById('img-preview').classList.add('show');
      uploadBtn.classList.add('has-image');
    };
    reader.readAsDataURL(file);
    e.target.value = '';
  }

  function removeImage() {
    uploadedImageB64 = null;
    document.getElementById('img-preview').classList.remove('show');
    uploadBtn.classList.remove('has-image');
  }

  function removeIntro() {
    const el = document.getElementById('intro');
    if (el) el.remove();
  }

  function scrollToBottom() {
    feed.scrollTo({ top: feed.scrollHeight, behavior: 'smooth' });
  }

  function addSkeleton() {
    removeIntro();
    const card = document.createElement('div');
    card.className = 'skeleton-card';
    card.innerHTML = `
      <div class="skeleton-img">
        <div class="spinner"></div>
        <span>Generando imagen…</span>
      </div>`;
    feed.appendChild(card);
    // Scroll after paint so layout is complete
    requestAnimationFrame(() => scrollToBottom());
    return card;
  }

  function addImageCard(b64, type, promptText) {
    const card = document.createElement('div');
    card.className = 'img-card';

    // Image with hover overlay
    const wrapper = document.createElement('div');
    wrapper.className = 'img-wrapper';

    const img = document.createElement('img');
    img.alt = promptText;

    const overlay = document.createElement('div');
    overlay.className = 'img-overlay';

    const dlBtn = document.createElement('button');
    dlBtn.className = 'dl-hover-btn';
    dlBtn.innerHTML = `
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Descargar`;
    dlBtn.onclick = () => {
      const a = document.createElement('a');
      a.href = `data:image/png;base64,${b64}`;
      a.download = `axioma-${type}-${Date.now()}.png`;
      a.click();
    };

    overlay.appendChild(dlBtn);
    wrapper.appendChild(img);
    wrapper.appendChild(overlay);

    // Meta bar
    const meta = document.createElement('div');
    meta.className = 'img-meta';
    const badge = document.createElement('span');
    badge.className = 'type-badge';
    badge.textContent = TYPE_LABELS[type] || type;
    const label = document.createElement('span');
    label.className = 'img-prompt-text';
    label.title = promptText;
    label.textContent = promptText;
    meta.appendChild(badge);
    meta.appendChild(label);

    card.appendChild(wrapper);
    card.appendChild(meta);
    feed.appendChild(card);

    img.onload = () => {
      requestAnimationFrame(() => scrollToBottom());
    };
    // Set src after onload is registered
    img.src = `data:image/png;base64,${b64}`;
  }

  function addError(msg) {
    const err = document.createElement('div');
    err.className = 'err-card';
    err.textContent = msg;
    feed.appendChild(err);
    requestAnimationFrame(() => scrollToBottom());
  }

  async function generate() {
    const text = promptEl.value.trim();
    if (!text || genBtn.disabled) return;

    genBtn.disabled = true;
    const skeleton = addSkeleton();

    try {
      const res = await fetch('/api/generate-image', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          type:  selectedType,
          prompt: text,
          image: uploadedImageB64 || null,
          model: selectedModel,
        }),
      });
      const data = await res.json();
      skeleton.remove();

      if (data.error) {
        addError(`Error: ${data.error}`);
      } else {
        addImageCard(data.image, selectedType, text);
        promptEl.value = '';
        promptEl.style.height = 'auto';
        removeImage();
      }
    } catch {
      skeleton.remove();
      addError('Error de conexión. Intenta de nuevo.');
    } finally {
      genBtn.disabled = false;
      promptEl.focus();
    }
  }
</script>
</body>
</html>
